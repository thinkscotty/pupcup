# PupCup configuration — installed to /etc/pupcup/config.yaml by bootstrap.sh.
#
# Every value below is the built-in default (see internal/config Default());
# this file documents them and is the place to make per-device changes. Any
# field may also be overridden at runtime by a PUPCUP_<UPPER_SNAKE> env var
# (e.g. PUPCUP_LISTEN, PUPCUP_BUTTON_PINS_GREEN) — env wins over this file.
# The config is validated at startup and the daemon fails fast on a bad value.

# --- Network / storage -------------------------------------------------------
listen: ":80"                              # HTTP bind address (needs CAP_NET_BIND_SERVICE for :80)
db_path: "/var/lib/pupcup/pupcup.sqlite"   # SQLite file (WAL); StateDirectory in the unit
photo_dir: "/var/lib/pupcup/photos"        # uploaded dog photos
timezone: "America/New_York"               # IANA tz; drives the household-local day

# --- Display -----------------------------------------------------------------
# Which panel this build drives. "gc9a01" = 240x240 round RGB SPI LCD (the
# reference build, default). "oled" = 128x64 mono SSD1306 over I2C — cheaper
# and easier to source; set this if you built the OLED variant. It uses
# i2c_bus/oled_addr below and ignores the lcd_* fields.
display: "gc9a01"

# --- Hardware (BCM/GPIO numbers; see pupcup_hardware_build.md §3) -------------
# Buttons: GREEN=BCM12, YELLOW=BCM16, RED=BCM5, BLUE=BCM6 (RED/BLUE moved off
# 20/21, which SPI1 now claims); rotary CLK=17 DT=27 SW=22. These come from the
# binary's built-in defaults (see the note below).
spi_device: "/dev/spidev0.0"               # SK6812 NeoPixel on SPI0, via 74AHCT125 level shifter
neopixel_count: 8                          # SK6812 stick length

# GC9A01 round LCD on the auxiliary SPI1 bus (used when display: gc9a01). Pi
# prereq in /boot/firmware/config.txt: dtoverlay=spi1-1cs, core_freq=400,
# core_freq_min=400 — creates /dev/spidev1.0 and pins the aux-SPI clock. CS
# (BCM18) is asserted by the kernel SPI driver; only DC and RST are app-driven.
lcd_spi_device: "/dev/spidev1.0"
lcd_dc_pin: 25                             # data/command select (BCM)
lcd_rst_pin: 24                            # reset (BCM)

# SSD1306 OLED on I2C (used when display: oled). The default GC9A01 build uses
# no I2C at all, so these are ignored there.
i2c_bus: 1
oled_addr: 0x3C                            # SSD1306 128x64

# button_pins / rotary_pins are fixed, soldered BCM assignments — they come
# from the binary's built-in defaults (internal/config Default(), the source
# of truth) so a pin correction ships with a normal deploy instead of needing
# a hand-edit here. Override per-device only if you must, via env vars
# (PUPCUP_BUTTON_PINS_GREEN, PUPCUP_ROTARY_PINS_CLK, …) or by re-adding the
# button_pins:/rotary_pins: blocks below.

button_debounce_ms: 25
rotary_debounce_ms: 5                      # retained for compat; the Buxton decoder ignores it
long_press_ms: 1500                        # rotary-SW unlock & Blue-in-locked snack threshold

# --- Behavior ----------------------------------------------------------------
meal_lock_minutes: 240                     # post-meal lock, timed from the last meal
meal_complete_grace_minutes: 15            # wait for the remaining dogs before a partial lock (0 = lock at once)
snack_mode_idle_seconds: 60                # snack-mode walk-away timeout
addin_idle_seconds: 30                     # add-in picker walk-away → commit the meal untagged
default_feed_kind: "standard"              # standard | nonstandard
mdns_hostname: "pupcup"                    # advertised as <name>.local

# --- Web / photo uploads -----------------------------------------------------
photo_max_kb: 150                          # reject larger uploads
photo_max_px: 320                          # reject images wider/taller than this
