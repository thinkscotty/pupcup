{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}PupCup{{end}}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="paw" aria-hidden="true">&#128062;</span>
      <span class="brand-name">PupCup</span>
    </a>
    <nav class="site-nav">
      <a href="/"{{if eq .Nav "dashboard"}} class="active" aria-current="page"{{end}}>Today</a>
      <a href="/feedings"{{if eq .Nav "feedings"}} class="active" aria-current="page"{{end}}>Feedings</a>
      <a href="/illness"{{if eq .Nav "illness"}} class="active" aria-current="page"{{end}}>Illness</a>
      <a href="/stress"{{if eq .Nav "stress"}} class="active" aria-current="page"{{end}}>Stress</a>
      <a href="/history"{{if eq .Nav "history"}} class="active" aria-current="page"{{end}}>History</a>
      <a href="/dogs"{{if eq .Nav "dogs"}} class="active" aria-current="page"{{end}}>Dogs</a>
    </nav>
    {{if .Host}}<span class="host-hint">{{.Host}}</span>{{end}}
  </header>
  <main class="page">
    {{block "content" .}}{{end}}
  </main>
  <footer class="site-footer">
    <span>PupCup {{.Version}}</span>
  </footer>
</body>
</html>{{end}}
